<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Analytics</title>
    <link rel="stylesheet" href="price-tracking.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
    <div class="container">
        <h1>Pricing Analytics</h1>
        
        <!-- Product Selection -->
        <label for="product-select">Select Product:</label>
        <select id="product-select">
            <option value="">-- Select a Product --</option>
        </select>

        <!-- Price Trend Graph -->
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <!-- Price Alert Section -->
        <div class="price-alert">
            <h2>Set Price Alert</h2>
            <label for="alert-price">Notify me when price drops below:</label>
            <input type="number" id="alert-price" placeholder="Enter amount">
            <button id="set-alert">Set Alert</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="price-tracking.js"></script>
</body>
</html>
